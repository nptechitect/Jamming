<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="30%" r="75%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <symbol id="musicNote" viewBox="0 0 24 24">
      <circle cx="6" cy="14" r="4" fill="#f59e0b"/>
      <path d="M8,10 L8,2 L20,6 L20,8" stroke="#f59e0b" stroke-width="2" fill="none"/>
    </symbol>
  </defs>

  <!-- Background gradient -->
  <rect width="1920" height="1080" fill="url(#bgGrad)" />

  <!-- Subtle bokeh circles -->
  <circle cx="300" cy="200" r="120" fill="#fff" opacity="0.05"/>
  <circle cx="1600" cy="300" r="80" fill="#fff" opacity="0.07"/>
  <circle cx="800" cy="600" r="200" fill="#fff" opacity="0.04"/>
  <circle cx="400" cy="900" r="100" fill="#fff" opacity="0.06"/>
  <circle cx="1400" cy="800" r="150" fill="#fff" opacity="0.05"/>

  <!-- Music notes scattered -->
  <use href="#musicNote" x="500" y="150" width="48" height="48" opacity="0.8"/>
  <use href="#musicNote" x="1200" y="100" width="36" height="36" opacity="0.6" transform="scale(-1,1) translate(-1200,0)"/>
  <use href="#musicNote" x="300" y="750" width="60" height="60" opacity="0.7"/>
  <use href="#musicNote" x="1600" y="650" width="50" height="50" opacity="0.5"/>
  <use href="#musicNote" x="900" y="400" width="72" height="72" opacity="0.8"/>

</svg>